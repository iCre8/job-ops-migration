name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        run: pnpm nx lint web

  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: TypeScript and Svelte check
        run: pnpm nx typecheck web

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Vitest
        run: pnpm --filter @job-ops/web exec vitest run --reporter=verbose --exclude="**/infra/docker-health*"
        env:
          NODE_ENV: test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build SvelteKit app
        run: pnpm nx build web
        env:
          DATABASE_URL: "mongodb://localhost:27017/jobops_build"
          GMAIL_OAUTH_CLIENT_ID: "build_placeholder"
          GMAIL_OAUTH_CLIENT_SECRET: "build_placeholder"
          DO_SPACES_ENDPOINT: "https://nyc3.digitaloceanspaces.com"
          DO_SPACES_KEY: "build_placeholder"
          DO_SPACES_SECRET: "build_placeholder"
          DO_SPACES_BUCKET: "build_placeholder"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sveltekit-build
          path: apps/web/build/
          retention-days: 3

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @job-ops/web exec playwright install --with-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sveltekit-build
          path: apps/web/build/
      - name: Start app and run Playwright tests
        run: pnpm nx e2e web
        env:
          NODE_ENV: test
          DATABASE_URL: "mongodb://localhost:27017/jobops_e2e"
          DO_SPACES_ENDPOINT: "https://nyc3.digitaloceanspaces.com"
          DO_SPACES_KEY: "e2e_placeholder"
          DO_SPACES_SECRET: "e2e_placeholder"
          DO_SPACES_BUCKET: "e2e_placeholder"
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
