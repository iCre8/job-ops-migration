name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/web-ci.yml"

env:
  PNPM_VERSION: "9.1.1"
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @job-ops/web run lint

      - name: Type check
        run: pnpm --filter @job-ops/web run check:types

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @job-ops/web run test:run

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: mongodb://localhost:27017/jobops_e2e?directConnection=true
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @job-ops/web run db:generate

      - name: Build
        run: pnpm --filter @job-ops/web run build
        env:
          NODE_ENV: production

      - name: Install Playwright browsers
        run: pnpm --filter @job-ops/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @job-ops/web exec playwright test
