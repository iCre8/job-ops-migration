    <script
      defer
      src="https://umami.dakheera47.com/script.js"
      data-website-id="0dc42ed1-87c3-4ac0-9409-5a9b9588fe66"
    ></script>
    <script>
      window.op =
        window.op ||
        (() => {
          const queue = [];
          const track = (...args) => {
            if (args.length > 0) {
              queue.push(args);
            }
          };

          return new Proxy(track, {
            get: (_target, property) => {
              if (property === "q") {
                return queue;
              }

              return (...args) => {
                queue.push([property, ...args]);
              };
            },
            has: (_target, property) => property === "q",
          });
        })();

      window.op("init", {
        apiUrl: "https://openpanel.dakheera47.com/api",
        clientId: "6a953241-309b-4e5a-be1b-412c5d7b6544",
        trackScreenViews: true,
        trackOutgoingLinks: true,
        trackAttributes: true,
      });
    </script>
    <script src="https://openpanel.dev/op1.js" defer async></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
