# =============================================================================
# Job Ops - Docker Compose Configuration
# =============================================================================
services:
  job-ops:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - github_token
    image: ghcr.io/dakheera47/job-ops:latest
    container_name: job-ops
    ports:
      - "3005:3001"
    volumes:
      - ./data:/app/data
      - codex-home:/app/codex-home
    environment:
      NODE_ENV: production
      PORT: 3001
      PYTHON_PATH: /usr/bin/python3
      CODEX_HOME: /app/codex-home
    env_file:
      - path: ./.env
        required: false
    develop:
      watch:
        - path: ./orchestrator/package.json
          action: rebuild
        - path: ./orchestrator/src
          target: /app/orchestrator/src
          action: sync+restart
        - path: ./visa-sponsor-providers
          target: /app/visa-sponsor-providers
          action: sync+restart
        - path: ./career-boards/bamboohr/src
          target: /app/career-boards/bamboohr/src
          action: sync+restart
        - path: ./career-boards/workday/src
          target: /app/career-boards/workday/src
          action: sync+restart
        - path: ./extractors
          target: /app/extractors
          action: sync+restart
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  hermes-agent:
    build:
      context: .
      dockerfile: apps/hermes-agent/Dockerfile
    container_name: hermes-agent
    depends_on:
      - job-ops
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
    env_file:
      - path: ./.env
        required: false
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    # Standalone with auth. Auth + replica set requires a keyFile; standalone does not.
    # The driver sends SCRAM credentials from the URL, so auth must be enabled.
    # For local dev (Prisma transactions), use apps/web/docker-compose.yml which has --replSet.
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-jobops}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-jobops}
    command: mongod --auth --bind_ip_all
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

secrets:
  github_token:
    environment: GITHUB_TOKEN

volumes:
  codex-home:
  mongo-data:
