version: "3.9"

# ─── Job-Ops Migration Stack ──────────────────────────────────────────────────
# Services: mongo, web (SvelteKit), extractor (Python/FastAPI sidecar)
#
# Quick start:
#   cp .env.example .env        # fill in secrets
#   docker compose up -d
#   docker compose logs -f web  # watch startup
#
# Health checks:
#   curl http://localhost:3005/health  → { ok: true }

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-jobops}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: jobops
    volumes:
      - mongo_data:/data/db
    # Expose only in development — remove or firewall in production
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      extractor:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3005}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: >-
        mongodb://${MONGO_USER:-jobops}:${MONGO_PASSWORD}@mongo:27017/jobops?authSource=admin
      # DigitalOcean Spaces (S3-compatible)
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT}
      DO_SPACES_KEY: ${DO_SPACES_KEY}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET}
      DO_SPACES_CDN_URL: ${DO_SPACES_CDN_URL:-}
      # Extractor sidecar
      EXTRACTOR_URL: http://extractor:8000
      # LLM
      LLM_API_KEY: ${LLM_API_KEY}
      MODEL: ${MODEL:-google/gemini-flash-1.5}
      # RxResume
      RXRESUME_URL: ${RXRESUME_URL:-https://v4.rxresu.me}
      RXRESUME_EMAIL: ${RXRESUME_EMAIL:-}
      RXRESUME_PASSWORD: ${RXRESUME_PASSWORD:-}
      # Auth (optional basic auth for write endpoints)
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-}
      # Gmail OAuth
      GMAIL_OAUTH_CLIENT_ID: ${GMAIL_OAUTH_CLIENT_ID:-}
      GMAIL_OAUTH_CLIENT_SECRET: ${GMAIL_OAUTH_CLIENT_SECRET:-}
      GMAIL_OAUTH_REDIRECT_URI: ${GMAIL_OAUTH_REDIRECT_URI:-}
      # Tracer links
      JOBOPS_PUBLIC_BASE_URL: ${JOBOPS_PUBLIC_BASE_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  extractor:
    build:
      context: services/extractor
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      # JobSpy / extractor config
      JOBSPY_IS_REMOTE: ${JOBSPY_IS_REMOTE:-0}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
      ADZUNA_MAX_JOBS_PER_TERM: ${ADZUNA_MAX_JOBS_PER_TERM:-25}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mongo_data:
    name: ${MONGO_VOLUME_NAME:-jobops_mongo_data}
